version: '3.8'

services:
  postgres:
    image: postgres:15
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sms_user} -d ${POSTGRES_DB:-sms_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sms_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sms_pass}
      POSTGRES_DB: ${POSTGRES_DB:-sms_db}
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: sms_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  hasura:
    image: hasura/graphql-engine:v2.26.0
    ports:
      - "8082:8080"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgres://${POSTGRES_USER:-sms_user}:${POSTGRES_PASSWORD:-sms_pass}@postgres:5432/${POSTGRES_DB:-sms_db}
      HASURA_GRAPHQL_ADMIN_SECRET: ${HASURA_GRAPHQL_ADMIN_SECRET:-supersecret}
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      HASURA_GRAPHQL_JWT_SECRET: >
        {
          "type": "HS256",
          "key": "${ACCESS_TOKEN_SECRET:-dev_access_secret}"
        }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "3003:3003"
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-sms_user}:${POSTGRES_PASSWORD:-sms_pass}@postgres:5432/${POSTGRES_DB:-sms_db}
      - REDIS_URL=redis://redis:6379
      - HASURA_GRAPHQL_ENDPOINT=http://hasura:8080/v1/graphql
      - HASURA_ADMIN_SECRET=${HASURA_GRAPHQL_ADMIN_SECRET:-supersecret}
      - ACCESS_TOKEN_SECRET=${ACCESS_TOKEN_SECRET:-dev_access_secret}
      - PORT=3003
      - NODE_ENV=development
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev
    depends_on:
      postgres:
        condition: service_healthy
      hasura:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redis_data: