table:
  name: users
  schema: public
select_permissions:
  - role: director
    permission:
      columns:
        - full_name
        - id
        - password
        - role
        - created_at
      filter:
        school_id:
          _eq: X-Hasura-School-Id
      allow_aggregations: true
  - role: student
    permission:
      columns:
        - full_name
        - id
        - password
        - role
        - created_at
      filter:
        id:
          _eq: X-Hasura-User-Id
      allow_aggregations: true
  - role: teacher
    permission:
      columns:
        - full_name
        - id
        - password
        - role
        - created_at
      filter:
        id:
          _eq: X-Hasura-User-Id
      allow_aggregations: true
