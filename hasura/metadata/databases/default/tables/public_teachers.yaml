table:
  name: teachers
  schema: public
object_relationships:
  - name: user
    using:
      foreign_key_constraint_on: user_id
select_permissions:
  - role: director
    permission:
      columns:
        - subject
        - teacher_id
        - user_id
        - created_at
      filter: {}
      allow_aggregations: true
  - role: student
    permission:
      columns:
        - subject
        - teacher_id
        - user_id
        - created_at
      filter:
        user_id:
          _eq: X-Hasura-User-Id
      allow_aggregations: true
  - role: teacher
    permission:
      columns:
        - subject
        - teacher_id
        - user_id
        - created_at
      filter:
        user_id:
          _eq: X-Hasura-User-Id
      allow_aggregations: true
