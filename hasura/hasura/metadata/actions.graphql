type Mutation {
  loginUser(
    input: LoginUserInput!
  ): LoginUserResponse!
}

type Mutation {
  logoutUser(
    input: LogoutUserInput!
  ): LogoutUserResponse!
}

type Mutation {
  manageSchool(
    input: ManageSchoolInput!
  ): ManageSchoolResponse!
}

type Mutation {
  manageUsers(
    input: ManageUserInput!
  ): ManageUserResponse!
}

type Mutation {
  refreshToken(
    input: RefreshTokenInput!
  ): RefreshTokenResponse!
}

type Mutation {
  registerUser(
    input: RegisterUserInput!
  ): RegisterUserResponse!
}

input ManageUserInput {
  action: String!
  userId: String
  role: String!
  fullName: String
  password: String
  identifier: String!
  gradeSectionId: String
  subject: String
  office: String
}

input RegisterUserInput {
  role: String!
  fullName: String!
  password: String!
  identifier: String!
  gradeSectionId: String
  subject: String
  office: String
  schoolId: uuid
}

input LoginUserInput {
  role: String!
  identifier: String!
  password: String
}

input RefreshTokenInput {
  token: String!
}

input LogoutUserInput {
  token: String!
}

input ManageSchoolInput {
  action: String!
  schoolId: uuid
  name: String
  code: String
  address: String
}

type ManageUserResponse {
  success: Boolean!
  message: String!
  userId: String
  profile: jsonb
}

type RegisterUserResponse {
  success: Boolean!
  message: String!
  userId: uuid
  accessToken: String
  refreshToken: String
}

type LoginUserResponse {
  success: Boolean!
  message: String!
  accessToken: String
  refreshToken: String
  user: UserInfo
}

type UserInfo {
  userId: uuid!
  fullName: String!
  role: String!
}

type RefreshTokenResponse {
  success: Boolean!
  message: String!
  accessToken: String
  refreshToken: String
}

type LogoutUserResponse {
  success: Boolean!
  message: String!
}

type ManageSchoolResponse {
  success: Boolean!
  message: String!
  schoolId: uuid
  school: SchoolInfo
}

type SchoolInfo {
  id: uuid!
  name: String!
  code: String!
  address: String
}

