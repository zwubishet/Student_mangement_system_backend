- table:
    name: students
    schema: student
  select_permissions:
    - role: PARENT
      permission:
        columns:
          - date_of_birth
          - admission_number
          - first_name
          - gender
          - last_name
          - id
          - school_id
        filter:
          _and:
            - school_id:
                _eq: X-Hasura-School-Id
        allow_aggregations: true
    - role: SCHOOL_ADMIN
      permission:
        columns:
          - date_of_birth
          - admission_number
          - first_name
          - gender
          - last_name
          - id
          - school_id
        filter:
          school_id:
            _eq: X-Hasura-School-Id
        allow_aggregations: true
    - role: STUDENT
      permission:
        columns:
          - date_of_birth
          - admission_number
          - first_name
          - gender
          - last_name
          - id
          - school_id
        filter:
          _and:
            - school_id:
                _eq: X-Hasura-School-Id
            - id:
                _eq: X-Hasura-Student-Id
        allow_aggregations: true
    - role: SUPER_ADMIN
      permission:
        columns:
          - date_of_birth
          - admission_number
          - first_name
