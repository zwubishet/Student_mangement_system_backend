          table:
            name: teacherassignments
            schema: academic
- table:
    name: subjects
    schema: academic
  object_relationships:
    - name: school
      using:
        foreign_key_constraint_on: school_id
  array_relationships:
    - name: attendancesessions
      using:
        foreign_key_constraint_on:
          column: subject_id
          table:
            name: attendancesessions
            schema: operations
    - name: examsubjects
      using:
        foreign_key_constraint_on:
          column: subject_id
          table:
            name: examsubjects
            schema: operations
    - name: homeworks
      using:
        foreign_key_constraint_on:
          column: subject_id
          table:
            name: homeworks
            schema: operations
    - name: teacherassignments
      using:
        foreign_key_constraint_on:
          column: subject_id
          table:
            name: teacherassignments
            schema: academic
  select_permissions:
    - role: SCHOOL_ADMIN
      permission:
        columns:
          - name
          - id
          - school_id
        filter:
          school_id:
            _eq: X-Hasura-School-Id
        allow_aggregations: true
    - role: STUDENT
      permission:
        columns:
          - name
          - id
          - school_id
        filter:
          school_id:
            _eq: X-Hasura-School-Id
        allow_aggregations: true
    - role: SUPER_ADMIN
      permission:
        columns:
          - name
          - id
          - school_id
        filter: {}
        allow_aggregations: true
    - role: TEACHER
      permission:
        columns:
          - name
          - id
          - school_id
        filter:
          _and:
            - school_id:
                _eq: X-Hasura-School-Id
            - teacherassignments:
                teacher_id:
                  _eq: X-Hasura-Teacher-Id
        allow_aggregations: true
- table:
