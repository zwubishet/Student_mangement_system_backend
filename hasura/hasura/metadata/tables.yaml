- table:
    name: academicyears
    schema: academic
  select_permissions:
    - role: PARENT
      permission:
        columns:
          - end_date
          - start_date
          - name
          - id
          - school_id
        filter:
          school_id:
            _eq: X-Hasura-School-Id
        allow_aggregations: true
    - role: SCHOOL_ADMIN
      permission:
        columns:
          - end_date
          - start_date
          - name
          - id
          - school_id
        filter:
          school_id:
            _eq: X-Hasura-School-Id
        allow_aggregations: true
    - role: STUDENT
      permission:
        columns:
          - end_date
          - start_date
          - name
          - id
          - school_id
        filter:
          school_id:
            _eq: X-Hasura-School-Id
        allow_aggregations: true
    - role: SUPER_ADMIN
      permission:
        columns:
          - end_date
          - start_date
          - name
          - id
          - school_id
        filter:
          school_id:
            _eq: X-Hasura-School-Id
        allow_aggregations: true
    - role: TEACHER
      permission:
        columns:
          - end_date
          - start_date
          - name
          - id
          - school_id
        filter:
          school_id:
            _eq: X-Hasura-School-Id
        allow_aggregations: true
