    schema: academic
  object_relationships:
    - name: section
      using:
        foreign_key_constraint_on: section_id
    - name: subject
      using:
        foreign_key_constraint_on: subject_id
    - name: user
      using:
        foreign_key_constraint_on: teacher_id
- table:
    name: teachers
    schema: academic
  object_relationships:
    - name: school
      using:
        foreign_key_constraint_on: school_id
    - name: user
      using:
        foreign_key_constraint_on: user_id
  select_permissions:
    - role: SCHOOL_ADMIN
      permission:
        columns:
          - hire_date
          - email
          - first_name
          - last_name
          - phone
          - status
          - created_at
          - id
          - school_id
          - user_id
        filter:
          _and:
            - school_id:
                _eq: X-Hasura-School-Id
        allow_aggregations: true
    - role: SUPER_ADMIN
      permission:
        columns:
          - hire_date
          - email
          - first_name
          - last_name
          - phone
          - status
          - created_at
          - id
          - school_id
          - user_id
        filter: {}
    - role: TEACHER
      permission:
        columns:
          - hire_date
          - email
          - first_name
          - last_name
          - phone
          - status
          - created_at
          - id
          - school_id
          - user_id
        filter:
          _and:
            - school_id:
                _eq: X-Hasura-School-Id
            - id:
                _eq: X-Hasura-Teacher-Id
            - user_id:
                _eq: X-Hasura-User-Id
        allow_aggregations: true
