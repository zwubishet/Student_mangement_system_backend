actions:
  - name: loginUser
    definition:
      kind: synchronous
      handler: http://app:3003/auth/login
    permissions:
      - role: teacher
      - role: student
      - role: director
      - role: super_admin
  - name: logoutUser
    definition:
      kind: synchronous
      handler: http://app:3003/auth/logout
    permissions:
      - role: teacher
      - role: student
      - role: director
      - role: super_admin
  - name: manageSchool
    definition:
      kind: synchronous
      handler: http://app:3003/school/action/manageSchool
    permissions:
      - role: super_admin
  - name: manageUsers
    definition:
      kind: synchronous
      handler: http://app:3003/action/manageUsers
    permissions:
      - role: director
      - role: super_admin
  - name: refreshToken
    definition:
      kind: synchronous
      handler: http://app:3003/auth/refresh
    permissions:
      - role: teacher
      - role: student
      - role: director
      - role: super_admin
  - name: registerUser
    definition:
      kind: synchronous
      handler: http://app:3003/auth/register
    permissions:
      - role: super_admin
custom_types:
  enums: []
  input_objects:
    - name: ManageUserInput
    - name: RegisterUserInput
    - name: LoginUserInput
    - name: RefreshTokenInput
    - name: LogoutUserInput
    - name: ManageSchoolInput
  objects:
    - name: ManageUserResponse
    - name: RegisterUserResponse
    - name: LoginUserResponse
    - name: UserInfo
    - name: RefreshTokenResponse
    - name: LogoutUserResponse
    - name: ManageSchoolResponse
    - name: SchoolInfo
  scalars: []
